<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Questionario Sport Inclusivo</title>

<style>
body{
font-family:Arial;
background:#f4f6f9;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
}

h1,h2{
color:#1d4e89;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center;
}

th{
background:#1d4e89;
color:white;
}

textarea, select{
width:100%;
margin-top:5px;
padding:8px;
}

button{
margin-top:20px;
padding:15px;
background:#1d4e89;
color:white;
border:none;
cursor:pointer;
width:100%;
}
button:hover{
background:#163a6b;
}
</style>

</head>

<body>

<div class="container">

<h1>Questionario Sport Inclusivo</h1>

<form method="POST"
action="https://script.google.com/macros/s/AKfycbzSNf5RXeFjYSJK3pYtR69TWdBCvZeed7DUtdPmd0QAYfdh-v5K1Tj3cDJU9RYaX8m5/exec">

<!-- A -->
<h2>Sezione A</h2>

<label>Età</label>
<select name="eta" required>
<option>18–25</option>
<option>26–35</option>
<option>36–45</option>
<option>Oltre 45</option>
</select>

<br><br>

<label>Genere</label><br>
<label><input type="radio" name="genere" value="Maschio" required> Maschio</label>
<label><input type="radio" name="genere" value="Femmina"> Femmina</label>
<label><input type="radio" name="genere" value="Altro"> Altro</label>

<br><br>

<label>Ruolo</label>
<select name="ruolo">
<option>Istruttore</option>
<option>Educatore</option>
<option>Psicologo</option>
<option>Operatore sociale</option>
</select>

<br><br>

<label>Esperienza</label>
<select name="esperienza">
<option>&lt;1 anno</option>
<option>1–3 anni</option>
<option>4–6 anni</option>
<option>&gt;6 anni</option>
</select>

<br><br>

<label>Fascia partecipanti</label>
<select name="fascia">
<option>6–10</option>
<option>11–14</option>
<option>15–18</option>
<option>18+</option>
</select>

<!-- B -->
<h2>Sezione B</h2>

<table>
<tr>
<th>Item</th>
<th>1</th><th>2</th><th>3</th><th>4</th><th>5</th>
</tr>

<script>
const Bitems = [
"Inclusione sociale",
"Autostima",
"Relazioni",
"Regole",
"Collaborazione",
"Benessere psicologico",
"Riduzione problemi",
"Senso appartenenza",
"Integrazione culturale",
"Benessere fisico"
];

document.write(
Bitems.map((t,i)=>
`<tr>
<td>${t}</td>
${[1,2,3,4,5].map(v=>
`<td><input type="radio" name="B${i+1}" value="${v}" required></td>`
).join("")}
</tr>`
).join("")
);
</script>

</table>

<!-- C -->
<h2>Sezione C</h2>

<table>
<tr>
<th>Item</th>
<th>1</th><th>2</th><th>3</th><th>4</th><th>5</th>
</tr>

<tr>
<td>Efficacia sport educativo</td>
<td><input type="radio" name="C1" value="1" required></td>
<td><input type="radio" name="C1" value="2"></td>
<td><input type="radio" name="C1" value="3"></td>
<td><input type="radio" name="C1" value="4"></td>
<td><input type="radio" name="C1" value="5"></td>
</tr>

<tr>
<td>Multidisciplinarietà</td>
<td><input type="radio" name="C2" value="1" required></td>
<td><input type="radio" name="C2" value="2"></td>
<td><input type="radio" name="C2" value="3"></td>
<td><input type="radio" name="C2" value="4"></td>
<td><input type="radio" name="C2" value="5"></td>
</tr>

<tr>
<td>Prevenzione disagio</td>
<td><input type="radio" name="C3" value="1" required></td>
<td><input type="radio" name="C3" value="2"></td>
<td><input type="radio" name="C3" value="3"></td>
<td><input type="radio" name="C3" value="4"></td>
<td><input type="radio" name="C3" value="5"></td>
</tr>

<tr>
<td>Benefici duraturi</td>
<td><input type="radio" name="C4" value="1" required></td>
<td><input type="radio" name="C4" value="2"></td>
<td><input type="radio" name="C4" value="3"></td>
<td><input type="radio" name="C4" value="4"></td>
<td><input type="radio" name="C4" value="5"></td>
</tr>
</table>

<!-- D -->
<h2>Sezione D</h2>

<label>Cambiamenti osservati</label>
<textarea name="D1"></textarea>

<label>Punti di forza</label>
<textarea name="D2"></textarea>

<label>Miglioramenti</label>
<textarea name="D3"></textarea>

<label>Altro</label>
<textarea name="D4"></textarea>

<br>

<button type="submit">Invia questionario</button>

</form>

</div>

</body>
</html>
