<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Questionario Sport Inclusivo</title>

<style>
body{
font-family: 'Segoe UI', Arial, sans-serif;
background: linear-gradient(135deg, #eef2f7, #f7f9fc);
padding:20px;
margin:0;
}

.container{
max-width:950px;
margin:auto;
background:white;
padding:35px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

h1{
text-align:center;
color:#1d4e89;
margin-bottom:10px;
}

h2{
margin-top:35px;
color:#2c3e50;
border-left:5px solid #1d4e89;
padding-left:10px;
}

label{
font-weight:500;
display:block;
margin-top:10px;
}

select, textarea, input[type="text"]{
width:100%;
padding:10px;
margin-top:5px;
border-radius:8px;
border:1px solid #ccc;
}

select:focus, textarea:focus, input:focus{
outline:none;
border-color:#1d4e89;
box-shadow:0 0 5px rgba(29,78,137,0.3);
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
border-radius:10px;
overflow:hidden;
}

th{
background:#1d4e89;
color:white;
padding:10px;
}

td{
border-bottom:1px solid #eee;
text-align:center;
padding:8px;
}

button{
margin-top:25px;
padding:15px;
width:100%;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#1d4e89,#2f6bb0);
color:white;
font-size:16px;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}
</style>

</head>

<body>

<div class="container">

<h1>Questionario Sport Inclusivo</h1>

<form method="POST"
action="https://script.google.com/macros/s/AKfycbzSNf5RXeFjYSJK3pYtR69TWdBCvZeed7DUtdPmd0QAYfdh-v5K1Tj3cDJU9RYaX8m5/exec">

<!-- SEZIONE A -->
<h2>Sezione A</h2>

<label>Età</label>
<select name="eta" required>
<option>18–25</option>
<option>26–35</option>
<option>36–45</option>
<option>Oltre 45</option>
</select>

<label>Genere</label><br>

<label>
<input type="radio" name="genere" value="Maschio" required> Maschio
</label>

<label>
<input type="radio" name="genere" value="Femmina"> Femmina
</label>

<label>
<input type="radio" name="genere" value="Altro" id="genere_altro_radio"> Altro
</label>

<input type="text"
id="genere_altro_text"
placeholder="Specifica altro..."
style="display:none; margin-top:8px;">

<label>Ruolo</label>
<select name="ruolo">
<option>Istruttore</option>
<option>Educatore</option>
<option>Psicologo</option>
<option>Operatore sociale</option>
</select>

<label>Esperienza</label>
<select name="esperienza">
<option>&lt;1 anno</option>
<option>1–3 anni</option>
<option>4–6 anni</option>
<option>&gt;6 anni</option>
</select>

<label>Fascia partecipanti</label>
<select name="fascia">
<option>6–10</option>
<option>11–14</option>
<option>15–18</option>
<option>18+</option>
</select>

<!-- SEZIONE B -->
<h2>Sezione B – Benefici percepiti</h2>

<table>
<tr>
<th>Item</th>
<th>1</th><th>2</th><th>3</th><th>4</th><th>5</th>
</tr>

<script>
const Bitems = [
"Inclusione sociale",
"Autostima",
"Relazioni",
"Regole",
"Collaborazione",
"Benessere psicologico",
"Riduzione problemi",
"Senso appartenenza",
"Integrazione culturale",
"Benessere fisico"
];

document.write(
Bitems.map((t,i)=>
`<tr>
<td>${t}</td>
${[1,2,3,4,5].map(v=>
`<td><input type="radio" name="B${i+1}" value="${v}" required></td>`
).join("")}
</tr>`
).join("")
);
</script>

</table>

<!-- SEZIONE C -->
<h2>Sezione C – Valutazione</h2>

<table>
<tr>
<th>Item</th>
<th>1</th><th>2</th><th>3</th><th>4</th><th>5</th>
</tr>

<tr>
<td>Efficacia sport educativo</td>
<td><input type="radio" name="C1" value="1" required></td>
<td><input type="radio" name="C1" value="2"></td>
<td><input type="radio" name="C1" value="3"></td>
<td><input type="radio" name="C1" value="4"></td>
<td><input type="radio" name="C1" value="5"></td>
</tr>

<tr>
<td>Multidisciplinarietà</td>
<td><input type="radio" name="C2" value="1" required></td>
<td><input type="radio" name="C2" value="2"></td>
<td><input type="radio" name="C2" value="3"></td>
<td><input type="radio" name="C2" value="4"></td>
<td><input type="radio" name="C2" value="5"></td>
</tr>

<tr>
<td>Prevenzione disagio</td>
<td><input type="radio" name="C3" value="1" required></td>
<td><input type="radio" name="C3" value="2"></td>
<td><input type="radio" name="C3" value="3"></td>
<td><input type="radio" name="C3" value="4"></td>
<td><input type="radio" name="C3" value="5"></td>
</tr>

<tr>
<td>Benefici duraturi</td>
<td><input type="radio" name="C4" value="1" required></td>
<td><input type="radio" name="C4" value="2"></td>
<td><input type="radio" name="C4" value="3"></td>
<td><input type="radio" name="C4" value="4"></td>
<td><input type="radio" name="C4" value="5"></td>
</tr>
</table>

<!-- SEZIONE D -->
<h2>Sezione D – Domande aperte</h2>

<label>Cambiamenti osservati</label>
<textarea name="D1"></textarea>

<label>Punti di forza</label>
<textarea name="D2"></textarea>

<label>Miglioramenti</label>
<textarea name="D3"></textarea>

<label>Altro</label>
<textarea name="D4"></textarea>

<button type="submit">Invia questionario</button>

</form>

</div>

<!-- SCRIPT ALTRO -->
<script>
const radioAltro = document.getElementById("genere_altro_radio");
const textAltro = document.getElementById("genere_altro_text");

document.querySelectorAll('input[name="genere"]').forEach(r => {
  r.addEventListener("change", function () {

    if (radioAltro.checked) {
      textAltro.style.display = "block";
      textAltro.setAttribute("name", "genere");
    } else {
      textAltro.style.display = "none";
      textAltro.value = "";
      textAltro.setAttribute("name", "genere_altro");
    }

  });
});
</script>

</body>
</html>
